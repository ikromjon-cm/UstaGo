services:
  - type: web
    name: ustago-backend
    env: python
    region: frankfurt
    plan: free
    branch: main
    repo: https://github.com/ikromjon-cm/UstaGo.git
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --access-logfile -
    healthCheckPath: /api/v1/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ustago-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ustago-frontend.onrender.com,http://localhost:3000"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ustago-frontend.onrender.com,http://localhost:3000"
      - key: REDIS_URL
        value: "redis://redistogo:placeholder@localhost:6379"

  - type: web
    name: ustago-frontend
    env: node
    region: frankfurt
    plan: free
    branch: main
    repo: https://github.com/ikromjon-cm/UstaGo.git
    buildCommand: |
      cd frontend
      npm install
      npm run build
    startCommand: cd frontend && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: NEXT_PUBLIC_API_URL
        value: "https://ustago-backend.onrender.com/api/v1"
      - key: NEXT_PUBLIC_WS_URL
        value: "wss://ustago-backend.onrender.com"

databases:
  - name: ustago-db
    region: frankfurt
    plan: free
    databaseName: ustago
    user: ustago
