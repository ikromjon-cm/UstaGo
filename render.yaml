services:
  - type: web
    name: ustago-backend
    env: python
    region: frankfurt
    plan: free
    branch: main
    repo: https://github.com/ikromjon-cm/UstaGo.git
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --access-logfile -
    healthCheckPath: /api/v1/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: "django-insecure-ustago-prod-2024-x9k@m^!z&v"
      - key: DATABASE_URL
        value: "postgres://postgres:ikromjon09%40@zjvanpbeppghhgkouzmf.supabase.co:5432/postgres?sslmode=require"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: ".onrender.com,http://localhost:3000,https://ustago-frontend.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: ".onrender.com,https://ustago-frontend.vercel.app"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
