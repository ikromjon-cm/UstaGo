version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ustago-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ustago
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ustago-network

  redis:
    image: redis:7-alpine
    container_name: ustago-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ustago-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ustago-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./backend/logs:/app/logs
      - ./backend/backups:/app/backups
    environment:
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ustago
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,api.ustago.uz}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://ustago.uz}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_SECRET_KEY: ${PAYME_SECRET_KEY:-}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      UZUM_MERCHANT_ID: ${UZUM_MERCHANT_ID:-}
      UZUM_SECRET_KEY: ${UZUM_SECRET_KEY:-}
      ESKIZ_TOKEN: ${ESKIZ_TOKEN:-}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS:-}
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             python manage.py loaddata fixtures/initial.json &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 8 --threads 4 --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 50 --worker-class gthread"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ustago-network

  daphne:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ustago-daphne
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ustago
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    expose:
      - "9000"
    command: daphne -b 0.0.0.0 -p 9000 config.asgi:application
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ustago-network

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: ustago-celery-worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - media_volume:/app/media
    environment:
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ustago
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    networks:
      - ustago-network

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: ustago-celery-beat
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ustago
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - ustago-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ustago-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      NEXT_PUBLIC_API_URL: https://api.ustago.uz/api/v1
      NEXT_PUBLIC_WS_URL: wss://api.ustago.uz/ws
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    expose:
      - "3000"
    networks:
      - ustago-network

  nginx:
    image: nginx:alpine
    container_name: ustago-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./docker/ssl:/etc/ssl/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      daphne:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ustago-network

  minio:
    image: minio/minio:latest
    container_name: ustago-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ustago}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ustago123}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ustago-network

  pgbackups:
    image: prodrigestivill/postgres-backup-local:16
    container_name: ustago-pgbackups
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/backups:/backups
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ustago
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_EXTRA_OPTS: -Z9
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    networks:
      - ustago-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ustago-pg-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ustago?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ustago-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: ustago-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - ustago-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ustago-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    networks:
      - ustago-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ustago-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docker/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      node-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ustago-network

  grafana:
    image: grafana/grafana:latest
    container_name: ustago-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana-dashboards:/etc/grafana/provisioning/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3001:3000"
    networks:
      - ustago-network

networks:
  ustago-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  minio_data:
  prometheus_data:
  grafana_data:
