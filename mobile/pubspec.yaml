name: ustago
description: UstaGo - Uzbekistan's Service Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^5.0.0
  flutter_staggered_animations: ^1.1.0
  animated_text_kit: ^4.2.2
  badges: ^3.1.2
  page_transition: ^2.1.0

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  get_it: ^8.0.2

  # Network
  dio: ^5.7.0
  retrofit: ^4.1.0
  graphql_flutter: ^5.2.0-beta.7
  connectivity_plus: ^6.1.0

  # Storage
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Location & Maps
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  flutter_polyline_points: ^2.1.0
  maps_launcher: ^3.1.0

  # Auth
  local_auth: ^2.3.0
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.2
  google_sign_in: ^6.2.1

  # Communication
  web_socket_channel: ^3.0.1
  flutter_callkit_incoming: ^2.0.1
  agora_rtc_engine: ^6.3.3
  permission_handler: ^11.3.1

  # Payments
  flutter_stripe: ^11.3.0
  webview_flutter: ^4.10.0

  # Camera & Media
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  video_player: ^2.9.2
  record: ^5.1.2
  photo_view: ^0.15.0
  file_picker: ^8.1.4

  # Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0
  device_info_plus: ^11.2.0
  share_plus: ^10.1.3
  path_provider: ^2.1.5
  image_compression_flutter: ^1.0.7
  flutter_dotenv: ^5.2.1
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5
  hive_generator: ^2.0.1
  freezed: ^2.5.7
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

flutter_native_splash:
  color: "#2563EB"
  image: assets/images/splash_logo.png
  android: true
  ios: true
